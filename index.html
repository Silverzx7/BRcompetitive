<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BR Competitive | FNCS</title>
    <style>
        body {
            background-color: #050505;
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            padding: 20px;
            border: 1px solid #222;
            border-radius: 15px;
            background: linear-gradient(145deg, #0a0a0a, #111);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 {
            color: #f3af19; /* Cor dourada tipo FNCS */
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 5px;
        }
        .status {
            display: inline-block;
            padding: 5px 15px;
            background: #ff0040;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        .links {
            margin-top: 20px;
        }
        .btn {
            text-decoration: none;
            color: black;
            background: white;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover {
            background: #f3af19;
        }
    </style>
</head>
<body>

    <div class="container">
        <span class="status">LIVE NOW</span>
        <h1>BR Competitive</h1>
        <p style="color: #888;">Every camp. Every final. Every player.</p>
        
        <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">
        
        <h2>FNCS Grand Finals Brazil</h2>
        <p>Acompanhe o topo da tabela em tempo real.</p>
        
        <div class="links">
            <a href="#" class="btn">Ver Leaderboard</a>
        </div>
    </div>

</body>
</html>
