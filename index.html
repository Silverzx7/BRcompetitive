<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BR Competitive | Hub</title>
    <style>
        :root {
            --bg: #0d0d0d;
            --card-bg: #161616;
            --accent: #00ff41; 
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --border: #262626;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
        }

        nav {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: rgba(13, 13, 13, 0.9);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { font-weight: 900; font-size: 1.2rem; text-transform: uppercase; }
        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }

        .tourney-card {
            max-width: 800px;
            margin: 0 auto;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* Banner com a imagem da FNCS */
        .tourney-banner {
            width: 100%;
            height: 350px; /* Aumentei para aparecer melhor */
            background-image: url('https://static.files.bbci.co.uk/ws/simorgh-assets/public/news/images/2023/10/16/fncs.jpg'); 
            background-size: cover;
            background-position: center;
            border-bottom: 1px solid var(--border);
        }

        .card-content {
            padding: 30px;
            text-align: left;
        }

        .tourney-type { color: var(--accent); font-size: 0.9rem; font-weight: bold; text-transform: uppercase; }
        .tourney-title { font-size: 2rem; margin: 10px 0; font-weight: 800; }
        
        .status-badge { display: flex; align-items: center; gap: 8px; color: var(--accent); font-weight: bold; font-size: 0.9rem; }
        .dot { width: 10px; height: 10px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 10px var(--accent); animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

            display: block;
            text-align: center;
            background: var(--accent);
            color: black;
            padding: 15px;
