<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BR Competitive | Hub</title>
    <style>
        :root {
            --bg: #0d0d0d;
            --card-bg: #161616;
            --accent: #00ff41; 
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --border: #262626;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
        }

        nav {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: rgba(13, 13, 13, 0.9);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { font-weight: 900; font-size: 1.2rem; text-transform: uppercase; }
        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }

        .tourney-card {
            max-width: 600px;
            margin: 0 auto;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .tourney-card:hover { border-color: var(--accent); }

        .tourney-banner {
            width: 100%;
            height: 250px;
            background-image: url('https://static.files.bbci.co.uk/ws/simorgh-assets/public/news/images/2023/10/16/fncs.jpg'); 
            background-size: cover;
            background-position: center;
        }

        .card-content { padding: 25px; }
        .tourney-type { color: var(--accent); font-size: 0.8rem; font-weight: bold; }
        .tourney-title { font-size: 1.8rem; margin: 10px 0; font-weight: 800; }
        
        .status-badge { display: flex; align-items: center; gap: 8px; color: var(--accent); font-weight: bold; font-size: 0.9rem; }
        .dot { width: 10px; height: 10px; background: var(--accent); border-radius: 50%; animation: pulse 1.5s infinite; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .btn {
            display: block;
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 900;
            margin-top: 10px;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .btn-main { background: var(--accent); color: black; }
        .btn-outline { border: 2px solid var(--accent); color: var(--accent); }
        .btn:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">BR<span style="color:var(--accent)">COMPETITIVE</span></div>
        <div style="border: 1px solid var(--accent); color: var(--accent); padding: 4px 12px; border-radius: 4px; font-size: 0.7rem; font-weight: bold;">BRASIL</div>
    </nav>

    <div class="container">
        <h2 style="text-align: center; margin-bottom: 30px;">Campeonatos Ativos</h2>
        
        <div class="tourney-card">
            <div class="tourney-banner"></div> 
            <div class="card-content">
                <span class="tourney-type">MAJOR 2</span>
                <div class="tourney-title">FNCS Grand Finals</div>
                <div class="status-badge"><div class="dot"></div> AO VIVO</div>
                
                <a href="leaderboard.html" class="btn btn-main">Ver Leaderboard</a>
                <a href="mapa.html" class="btn btn-outline">Ver Drop Spots</a>
            </div>
        </div>
    </div>

</body>
</html>
