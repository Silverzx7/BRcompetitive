<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BR Competitive | Hub</title>
    <style>
        :root {
            --bg: #0d0d0d;
            --card-bg: #161616;
            --accent: #00ff41; 
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --border: #262626;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
        }

        nav {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: rgba(13, 13, 13, 0.9);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { font-weight: 900; font-size: 1.2rem; }
        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }

        .tourney-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .tourney-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden; /* Para a imagem não sair da borda arredondada */
            transition: all 0.3s ease;
        }

        .tourney-card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
        }

        /* ESTILO DA FOTO/BANNER */
        .tourney-banner {
            width: 100%;
            height: 180px;
            background-image: url('https://pbs.twimg.com/media/GH8Tq52X0AA5l8A?format=jpg&name=large'); /* Link da imagem da FNCS */
            background-size: cover;
            background-position: center;
        }

        .card-content {
            padding: 20px;
        }

        .tourney-type { color: var(--accent); font-size: 0.8rem; font-weight: bold; text-transform: uppercase; }
        .tourney-title { font-size: 1.4rem; margin: 10px 0; font-weight: 700; }
        
        .status-badge { display: flex; align-items: center; gap: 8px; color: var(--accent); font-weight: bold; font-size: 0.85rem; }
        .dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 10px var(--accent); animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        .view-button {
            display: block;
            text-align: center;
            background: var(--accent);
            color: black;
            padding: 12px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 900;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">BR<span style="color:var(--accent)">COMPETITIVE</span></div>
        <div style="border: 1px solid var(--accent); color: var(--accent); padding: 2px 8px; border-radius: 4px; font-size: 0.7rem;">BRASIL</div>
    </nav>

    <div class="container">
        <h2>Campeonatos Ativos</h2>
        
        <div class="tourney-grid">
            
            <div class="tourney-card">
                <div class="tourney-banner"></div> <div class="card-content">
                    <span class="tourney-type">Major 2</span>
                    <div class="tourney-title">FNCS Grand Finals</div>
                    <div class="status-badge"><div class="dot"></div> AO VIVO AGORA</div>
                    <a href="leaderboard.html" class="view-button">VER LEADERBOARD</a>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
