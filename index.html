<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BR Competitive | FNCS</title>
    <style>
        :root {
            --gold: #f3af19;
            --dark: #0a0a0a;
            --gray: #1a1a1a;
        }
        body {
            background-color: var(--dark);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            text-align: center;
            margin: 40px 0;
        }
        h1 {
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 2.5rem;
            margin: 0;
        }
        .live-badge {
            background: #ff0040;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            animation: blink 1.5s infinite;
        }
        @keyframes blink { 50% { opacity: 0.5; } }

        /* Tabela de Leaderboard */
        .leaderboard-container {
            width: 100%;
            max-width: 600px;
            background: var(--gray);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #333;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background: #222;
            padding: 15px;
            text-align: left;
            color: var(--gold);
            font-size: 0.9rem;
        }
        td {
            padding: 15px;
            border-top: 1px solid #333;
        }
        tr:hover { background: #252525; }
        
        .rank { font-weight: bold; color: var(--gold); width: 50px; }
        .points { text-align: right; font-weight: bold; }

        .footer-links {
            margin-top: 30px;
            display: flex;
            gap: 15px;
        }
        .btn {
            padding: 10px 20px;
            border: 1px solid var(--gold);
            color: var(--gold);
            text-decoration: none;
            border-radius: 5px;
            transition: 0.3s;
        }
        .btn:hover {
            background: var(--gold);
            color: black;
        }
    </style>
</head>
<body>

    <div class="header">
        <span class="live-badge">● AO VIVO</span>
        <h1>BR COMPETITIVE</h1>
        <p style="color: #888;">FNCS Grand Finals - Leaderboard Provisório</p>
    </div>

    <div class="leaderboard-container">
        <table>
            <thead>
                <tr>
                    <th class="rank">#</th>
                    <th>PLAYER / DUO</th>
                    <th style="text-align: right;">PONTOS</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td class="rank">1</td>
                    <td>👑 Player Exemplo 1</td>
                    <td class="points">245</td>
                </tr>
                <tr>
                    <td class="rank">2</td>
                    <td>Player Exemplo 2</td>
                    <td class="points">210</td>
                </tr>
                <tr>
                    <td class="rank">3</td>
                    <td>Player Exemplo 3</td>
                    <td class="points">198</td>
                </tr>
            </tbody>
        </table>
