<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard | BR Competitive</title>
    <style>
        :root { 
            --bg: #0d0d0d; 
            --accent: #00ff41; 
            --card-bg: #161616; 
            --border: #262626; 
        }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        
        nav { padding: 15px 5%; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: #000; position: sticky; top: 0; z-index: 100;}
        .back-btn { color: var(--accent); text-decoration: none; font-weight: bold; font-size: 0.9rem; }

        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }

        /* SISTEMA DE ABAS (TABS) */
        .tabs-container {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            overflow-x: auto;
            padding-bottom: 10px;
        }
        .tab-btn {
            background: #1a1a1a;
            border: 1px solid var(--border);
            color: #888;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 800;
            font-size: 0.75rem;
            white-space: nowrap;
            transition: 0.2s;
            text-transform: uppercase;
        }
        .tab-btn.active {
            background: var(--accent);
            color: black;
            border-color: var(--accent);
        }
        .tab-btn:hover:not(.active) {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* TABELA */
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }

        table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
        th { background: #222; padding: 15px; text-align: left; color: var(--accent); font-size: 0.7rem; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid var(--border); }
        
        .rank { font-weight: bold; color: var(--accent); width: 40px; }
        .duo-name { font-weight: 800; text-transform: uppercase; }
        .pts { text-align: right; font-weight: bold; font-family: monospace; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <nav>
        <div style="font-weight:900">BR<span style="color:var(--accent)">COMPETITIVE</span></div>
        <a href="index.html" class="back-btn">← VOLTAR</a>
    </nav>
    
    <div class="container">
        <div class="tabs-container">
            <button class="tab-btn active" onclick="openTab(event, 'finals')">Grand Finals</button>
            <button class="tab-btn" onclick="openTab(event, 'major1')">Major 1</button>
            <button class="tab-btn" onclick="openTab(event, 'heats')">Heats A & B</button>
            <button class="tab-btn" onclick="openTab(event, 'lastchance')">Last Chance</button>
        </div>

        <div id="finals" class="tab-content active">
            <table>
                <thead><tr><th class="rank">#</th><th>DUPLA (GRAND FINALS)</th><th class="pts">PTS</th></tr></thead>
                <tbody>
                    <tr><td class="rank">1</td><td class="duo-name">King & Phzin</td><td class="pts">0</td></tr>
                    <tr><td class="rank">2</td><td class="duo-name">Persa & Diguera</td><td class="pts">0</td></tr>
                </tbody>
            </table>
        </div>

        <div id="major1" class="tab-content">
            <table>
                <thead><tr><th class="rank">#</th><th>DUPLA (MAJOR 1)</th><th class="pts">PTS</th></tr></thead>
                <tbody>
                    <tr><td class="rank">1</td><td class="duo-name">Persa & Diguera</td><td class="pts">450</td></tr>
                    <tr><td class="rank">2</td><td class="duo-name">King & Phzin</td><td class="pts">420</td></tr>
                </tbody>
            </table>
        </div>

        <div id="heats" class="tab-content">
            <table>
                <thead><tr><th class="rank">#</th><th>DUPLA (HEATS)</th><th class="pts">PTS</th></tr></thead>
                <tbody>
                    <tr><td class="rank">1</td><td class="duo-name">Fazer & K1ng</td><td class="pts">180</td></tr>
                </tbody>
            </table>
        </div>

        <div id="lastchance" class="tab-content">
            <table>
                <thead><tr><th class="rank">#</th><th>DUPLA (LAST CHANCE)</th><th class="pts">PTS</th></tr></thead>
                <tbody>
                    <tr><td class="rank">1</td><td class="duo-name">Vadeyy & Sirence</td><td class="pts">210</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function openTab(evt, tabName) {
            var i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("tab-content");
            for (i = 0; i < tabcontent.length; i++) {
                tabcontent[i].classList.remove("active");
            }
            tablinks = document.getElementsByClassName("tab-btn");
            for (i = 0; i < tablinks.length; i++) {
                tablinks[i].classList.remove("active");
            }
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
        }
    </script>

</body>
</html>
