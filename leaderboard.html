<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estatísticas FNCS | BR Competitive</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #0f0f0f; 
            --card: #1a1a1a; 
            --accent: #00ff41; 
            --border: #2d2d2d;
            --text-dim: #a0a0a0;
        }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; }
        
        /* NAVBAR ESTILO TRACKER */
        nav { 
            background: #000; padding: 15px 5%; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000;
        }
        .nav-links { display: flex; gap: 20px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; }
        .nav-links a { color: var(--text-dim); text-decoration: none; transition: 0.3s; }
        .nav-links a:hover { color: white; }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }

        /* CARDS DE HISTÓRICO (Igual à imagem) */
        .history-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; margin-bottom: 50px; 
        }
        .season-card { 
            background: var(--card); border-radius: 12px; border: 1px solid var(--border);
            overflow: hidden; transition: 0.3s;
        }
        .season-card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .card-banner { height: 120px; background: linear-gradient(45deg, #111, #222); position: relative; padding: 20px; }
        .card-banner img { width: 60px; opacity: 0.8; }
        .badge-current { 
            position: absolute; top: 15px; right: 15px; background: #222; 
            color: var(--accent); padding: 4px 8px; border-radius: 4px; font-size: 0.6rem; 
            font-weight: 900; border: 1px solid var(--accent);
        }
        .card-body { padding: 20px; text-align: center; }
        .card-body h3 { margin: 0; font-size: 1.2rem; font-weight: 900; }
        .card-date { font-size: 0.75rem; color: var(--text-dim); margin: 5px 0 20px; }
        
        .card-stats { 
            display: flex; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
            margin: 0 -20px;
        }
        .stat-box { flex: 1; padding: 15px; border-right: 1px solid var(--border); }
        .stat-box:last-child { border-right: none; }
        .stat-label { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; display: block; }
        .stat-val { font-size: 1rem; font-weight: 900; color: white; }

        /* TABELA DE PLAYERS */
        .winners-list { list-style: none; padding: 15px 0 0; margin: 0; text-align: left; }
        .winner-row { display: flex; justify-content: space-between; font-size: 0.75rem; padding: 5px 0; }
        .winner-name { font-weight: bold; color: white; }
        .winner-prize { color: var(--text-dim); }

        /* ABAS DE NAVEGAÇÃO */
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .tab-btn { 
            background: none; border: none; color: var(--text-dim); cursor: pointer; 
            font-weight: 900; font-size: 0.75rem; text-transform: uppercase; padding: 10px 20px;
        }
        .tab-btn.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
    </style>
</head>
<body>

<nav>
    <div style="font-weight:900; font-size: 1.2rem; color: var(--accent);">BR COMPETITIVE</div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="mapa.html">Maps</a>
        <a href="#">Statistics</a>
        <a href="#">Heats</a>
        <a href="#">Grands</a>
    </div>
</nav>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active">All Events</button>
        <button class="tab-btn">LAN Events</button>
        <button class="tab-btn">Stats</button>
    </div>

    <div class="history-grid">
        
        <div class="season-card">
            <div class="card-banner">
                <span class="badge-current">● CURRENT</span>
                <img src="https://logodownload.org/wp-content/uploads/2018/07/fortnite-logo-3.png" alt="FNCS">
            </div>
            <div class="card-body">
                <h3>CH7 S2</h3>
                <div class="card-date">25-04-2026</div>
                <div class="card-stats">
                    <div class="stat-box"><span class="stat-label">Prize Pool</span><span class="stat-val">$592K</span></div>
                    <div class="stat-box"><span class="stat-label">Teams</span><span class="stat-val">50</span></div>
                </div>
                <div style="padding-top: 20px; color: var(--text-dim); font-size: 0.8rem;">No data yet</div>
            </div>
        </div>

        <div class="season-card">
            <div class="card-banner">
                <img src="https://logodownload.org/wp-content/uploads/2018/07/fortnite-logo-3.png" alt="FNCS">
            </div>
            <div class="card-body">
                <h3>GLOBAL CHAMPIONSHIP</h3>
                <div class="card-date">07-09-2025</div>
                <div class="card-stats">
                    <div class="stat-box"><span class="stat-label">Prize Pool</span><span class="stat-val">$2M</span></div>
                    <div class="stat-box"><span class="stat-label">Location</span><span class="stat-val">Lyon</span></div>
                </div>
                <ul class="winners-list">
                    <li class="winner-row">
                        <span class="winner-name">1. Swizzy Queasy Merstach</span>
                        <span class="winner-prize">$450K</span>
                    </li>
                    <li class="winner-row">
                        <span class="winner-name">2. Vanyak3k Pixie Mariuscow</span>
                        <span class="winner-prize">$300K</span>
                    </li>
                </ul>
            </div>
        </div>

    </div>
</div>

</body>
</html>
