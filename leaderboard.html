<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard | BR Competitive</title>
    <style>
        :root { --bg: #0d0d0d; --accent: #00ff41; --card-bg: #161616; --border: #262626; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        nav { padding: 10px 5%; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .back-btn { color: var(--accent); text-decoration: none; font-weight: bold; }
        .container { max-width: 800px; margin: 40px auto; }
        h1 { color: var(--accent); border-left: 4px solid var(--accent); padding-left: 15px; }
        table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 8px; overflow: hidden; }
        th { background: #222; padding: 15px; text-align: left; color: var(--accent); }
        td { padding: 15px; border-bottom: 1px solid var(--border); }
        tr:hover { background: #1a1a1a; }
    </style>
</head>
<body>
    <nav>
        <div style="font-weight:900">BR<span style="color:var(--accent)">COMPETITIVE</span></div>

    </nav>
    <div class="container">

        <table>
            <thead>
                <tr>
                    <th>Pos</th>

                    <th>Pontos</th>
                </tr>
            </thead>
            <tbody>
                <tr><td>1</td><td>👑 King & Phzin</td><td>284</td></tr>

</body>
</html>
