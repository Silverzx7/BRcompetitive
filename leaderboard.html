<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard | BR Competitive</title>
    <style>
        :root { 
            --bg: #0d0d0d; 
            --accent: #00ff41; 
            --card-bg: #161616; 
            --border: #262626; 
        }
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 0; 
        }
        nav { 
            padding: 15px 5%; 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
        }
        .back-btn { color: var(--accent); text-decoration: none; font-weight: bold; }
        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        h1 { color: var(--accent); border-left: 4px solid var(--accent); padding-left: 15px; margin-bottom: 30px; }
        
        table { 
            width: 100%; 
            border-collapse: collapse; 
            background: var(--card-bg); 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid var(--border);
        }
        th { 
            background: #222; 
            padding: 18px; 
            text-align: left; 
            color: var(--accent); 
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
