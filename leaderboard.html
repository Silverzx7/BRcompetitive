<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard Pro | BR Competitive</title>
    <style>
        :root { 
            --bg: #0d0d0d; 
            --accent: #00ff41; 
            --card-bg: #161616; 
            --border: #262626; 
            --gold: #ffd700;
            --text-dim: #888;
        }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        
        /* NAVBAR */
        nav { padding: 15px 5%; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000;}
        .back-btn { color: var(--accent); text-decoration: none; font-weight: bold; font-size: 0.8rem; border: 1px solid var(--accent); padding: 5px 12px; border-radius: 4px; transition: 0.3s; }
        .back-btn:hover { background: var(--accent); color: black; }

        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }

        /* HEADER DO CAMPEONATO (ESTILO TRACKER) */
        .event-header {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        .event-info h1 { margin: 5px 0; font-size: 2rem; font-weight: 900; }
        .event-stats { display: flex; gap: 30px; margin-top: 15px; }
        .stat { display: flex; flex-direction: column; }
        .stat-label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; font-weight: bold; }
        .stat-value { font-size: 1.1rem; font-weight: 800; color: var(--accent); }

        /* SISTEMA DE ABAS */
        .tabs-container { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .tab-btn {
            background: #1a1a1a; border: 1px solid var(--border); color: var(--text-dim);
            padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: 800;
            font-size: 0.7rem; text-transform: uppercase; white-space: nowrap; transition: 0.2s;
        }
        .tab-btn.active { background: var(--accent); color: black; border-color: var(--accent); }

        /* TABELA DE RESULTADOS */
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        
        table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
        th { background: #222; padding: 15px; text-align: left; color: var(--accent); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 14px 15px; border-bottom: 1px solid var(--border); }
        
        .rank-cell { width: 40px; font-weight: 900; color: var(--accent); font-size: 1.1rem; }
        .duo-cell { display: flex; flex-direction: column; }
        .duo-name { font-weight: 800; font-size: 0.95rem; text-transform: uppercase; }
        .duo-status { font-size: 0.65rem; color: var(--text-dim); margin-top: 3px; }
        
        .win-badge { background: var(--gold); color: black; padding: 2px 5px; border-radius: 3px; font-weight: 900; font-size: 0.6rem; margin-right: 5px; }
        
        .pts-cell { text-align: right; font-weight: 900; font-family: 'Courier New', monospace; font-size: 1.1rem; }
        
        tr:hover { background: rgba(255,255,255,0.03); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <nav>
        <div style="font-weight:900; font-size: 1.2rem;">BR<span style="color:var(--accent)">COMPETITIVE</span></div>
        <a href="index.html" class="back-btn">VOLTAR AO HUB</a>
    </nav>
    
    <div class="container">
        <div class="event-header">
            <div class="event-info">
                <span style="color: var(--accent); font-weight: 900; font-size: 0.75rem; text-transform: uppercase;">Fortnite Champion Series</span>
                <h1>GRAND FINALS</h1>
                <div class="event-stats">
                    <div class="stat"><span class="stat-label">Prize Pool</span><span class="stat-value">$592,450</span></div>
                    <div class="stat"><span class="stat-label">Region</span><span class="stat-value">Brazil</span></div>
                    <div class="stat"><span class="stat-label">Teams</span><span class="stat-value">50</span></div>
                </div>
            </div>
            <div style="text-align: right;">
                <div style="background: rgba(0,255,65,0.1); color: var(--accent); padding: 8px 15px; border-radius: 8px; font-weight: 900; font-size: 0.7rem; border: 1px solid var(--accent);">AO VIVO</div>
            </div>
        </div>

        <div class="tabs-container">
            <button class="tab-btn active" onclick="openTab(event, 'finals')">Grand Finals</button>
            <button class="tab-btn" onclick="openTab(event, 'heata')">Heat A</button>
            <button class="tab-btn" onclick="openTab(event, 'heatb')">Heat B</button>
            <button class="tab-btn" onclick="openTab(event, 'lastchance')">Last Chance</button>
            <button class="tab-btn" onclick="openTab(event, 'major1')">Major 1</button>
        </div>

        <div id="finals" class="tab-content active">
            <table>
                <thead>
                    <tr>
                        <th class="rank-cell">#</th>
                        <th>DUPLA / STATUS</th>
                        <th style="text-align: center;">VITS</th>
                        <th class="pts-cell">PTS</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="rank-cell">1</td>
                        <td class="duo-cell">
                            <span class="duo-name">King & Phzin</span>
                            <span class="duo-status">Qualified: Heat A (Rank 1)</span>
                        </td>
                        <td style="text-align: center;">0</td>
                        <td class="pts-cell">0</td>
                    </tr>
                    <tr><td class="rank-cell">2</td><td class="duo-cell"><span class="duo-name">Persa & Diguera</span><span class="duo-status">Qualified: Heat B (Rank 1)</span></td><td style="text-align: center;">0</td><td class="pts-cell">0</td></tr>
                    </tbody>
            </table>
        </div>

        <div id="heata" class="tab-content">
            <table>
                <thead>
                    <tr>
                        <th class="rank-cell">#</th>
                        <th>DUPLA</th>
                        <th style="text-align: center;">VITS</th>
                        <th class="pts-cell">PTS</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="rank-cell">1</td>
                        <td class="duo-cell">
                            <span class="duo-name">King & Phzin</span>
                            <span class="duo-status"><span class="win-badge">TOP 1</span> HEAT WINNER</span>
                        </td>
                        <td style="text-align: center;">2</td>
                        <td class="pts-cell">280</td>
                    </tr>
                    </tbody>
            </table>
        </div>

        </div>

    <script>
        function openTab(evt, tabName) {
            var i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("tab-content");
            for (i = 0; i < tabcontent.length; i++) { tabcontent[i].classList.remove("active"); }
            tablinks = document.getElementsByClassName("tab-btn");
            for (i = 0; i < tablinks.length; i++) { tablinks[i].classList.remove("active"); }
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
        }
    </script>
</body>
</html>
